services:
  web:
    image: python:3.11
    container_name: my-web-app
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install fastapi uvicorn && uvicorn app:app --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: my-postgres-db
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student123
      POSTGRES_DB: myappdb
    ports:
      - "5432:5432"